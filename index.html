<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>
<style>
    body{
        margin:0;
        font-family:Arial,sans-serif;
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }
    .card{
        text-align:center;
        background:white;
        padding:40px;
        border-radius:12px;
        box-shadow:0 4px 15px rgba(0,0,0,.1);
    }
    h1{color:#333;}
    p{color:#666;}
    a{
        display:inline-block;
        margin-top:15px;
        padding:10px 20px;
        background:#007bff;
        color:white;
        text-decoration:none;
        border-radius:6px;
    }
    a:hover{background:#0056b3;}
</style>
</head>
<body>
<div class="card">
    <h1>Welcome</h1>
    <p>Simple, fast, and responsive static website.</p>
    <a href="#">Get Started</a>
</div>
</body>
</html>
